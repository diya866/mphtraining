<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <title>Update Employee</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
</head>
<body>
  <div class="container my-5">
    <h3>Update Employee</h3>
    <div class="card">
      <div class="card-body">
        <form th:action="@{/employees/update/{id}(id=${employee.id})}" th:object="${employee}" method="post">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" th:field="*{name}" class="form-control" id="name" placeholder="Name" required>
            <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger"></span>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" th:field="*{email}" class="form-control" id="email" placeholder="Email" required>
            <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger"></span>
          </div>

          <div class="form-group">
            <label for="phoneNo">Phone No</label>
            <input type="tel" th:field="*{phoneNo}" class="form-control" id="phoneNo" placeholder="Phone No" pattern="[0-9]{10}" required>
            <span th:if="${#fields.hasErrors('phoneNo')}" th:errors="*{phoneNo}" class="text-danger"></span>
          </div>

          <button type="submit" class="btn btn-primary">Update Employee</button>
        </form>

        <hr>

        <form th:action="@{/employees/delete/{id}(id=${employee.id})}" method="get">
          <button type="submit" class="btn btn-danger">Delete Employee</button>
          <a href="/employees/list" class="btn btn-secondary">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
