<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <title>Employees</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
</head>
<body>
  <div class="container my-5">
    <div class="card">
      <div class="card-body">
        <p>
          <a href="/employees/signup" class="btn btn-primary">
            <i class="fas fa-user-plus"></i> Add Employee
          </a>
        </p>

        <div th:switch="${employees}">
          <h2 th:case="null">No employees yet!</h2>

          <div th:case="*">
            <div class="table-responsive">
              <table class="table table-striped">
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone No</th>
                    <th>Edit</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:each="employee : ${employees}">
                    <td th:text="${employee.name}"></td>
                    <td th:text="${employee.email}"></td>
                    <td th:text="${employee.phoneNo}"></td>
                    <td>
                      <a th:href="@{/employees/edit/{id}(id=${employee.id})}" class="btn btn-warning">
                        <i class="fas fa-user-edit"></i> Edit / Delete
                      </a>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</body>
</html>
